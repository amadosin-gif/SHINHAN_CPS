<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Shinhan Card · 쇼핑 혜택 Flow</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #EEF1F6;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #111;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }

  .stage {
    min-height: 100vh;
    display: flex;
    gap: 48px;
    align-items: center;
    justify-content: center;
    padding: 40px;
    flex-wrap: wrap;
  }

  /* Step rail (left) */
  .rail {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    left: 24px;
    width: 220px;
    background: #fff;
    border-radius: 18px;
    padding: 18px 16px;
    box-shadow: 0 8px 30px rgba(20,30,60,0.08);
    z-index: 50;
  }
  .rail h3 { margin:0 0 12px; font-size: 13px; font-weight: 700; color:#1F2A44; letter-spacing:-0.01em;}
  .rail .step {
    display: flex; gap: 10px; align-items: center;
    padding: 9px 10px; border-radius: 10px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; color:#5A6478;
    transition: all .18s ease;
  }
  .rail .step:hover { background:#F1F5FB; color:#0046FF; }
  .rail .step.active { background:#E8F0FF; color:#0046FF; font-weight: 700; }
  .rail .step .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background:#E5EAF2; color:#5A6478;
    display:flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: 11.5px; flex-shrink: 0;
  }
  .rail .step.active .dot { background:#0046FF; color:#fff;}

  .device-shell { display:flex; flex-direction: column; align-items:center; gap: 14px;}
  .device-shell .label {
    font-size: 12px; color:#5A6478; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  [data-cc-id] { outline: none; }

  @media (max-width: 1100px) {
    .rail { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── ios-frame.jsx ───────────────────────────────────────────

          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>

        <svg width="27" height="13" viewBox="0 0 27 13">

    </div>

}

function IOSDevice({ children, width = 390, height = 844, dark = false, time = '9:41' }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: 'Pretendard, -apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} time={time} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>

}

// ─── icons.jsx ───────────────────────────────────────────────

const SHC = {
  blue: '#0046FF',
  blueDeep: '#002BB8',
  blueLight: '#E8F0FF',
  blueSoft: '#3B70FF',
  ink: '#0F1424',
  text: '#1F2A44',
  sub: '#5A6478',
  mute: '#8A93A6',
  line: '#E5EAF2',
  bg: '#F4F6FA',
  white: '#fff',
  yellow: '#FFC940',
  yellowDeep: '#E8A600',
  red: '#FF3B30',
  redLight: '#FFEEEC',
};

function PointCoin({ size = 28 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display:'block' }}>
      <circle cx="20" cy="20" r="18" fill="#FFC940" />
      <text x="20" y="27" textAnchor="middle"
        fontFamily="Pretendard, system-ui" fontWeight="800" fontSize="18" fill="#7A4A00">P</text>
    </svg>
  );
}

function Chevron({ dir = 'right', size = 14, color = '#1F2A44' }) {
  const map = { right: 0, left: 180, down: 90, up: -90 };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={{ transform:`rotate(${map[dir]}deg)` }}>
      <path d="M9 6l6 6-6 6" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}

function CloseX({ size = 22, color = '#1F2A44', stroke = 2.2 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18" stroke={color} strokeWidth={stroke} strokeLinecap="round"/>
    </svg>
  );
}

function SearchIcon({ size = 20, color = '#5A6478' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="6.5" stroke={color} strokeWidth="2"/>
      <path d="M16 16l4 4" stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>

}

function HomeIcon({ size = 22, color = '#1F2A44' }) {

}

function CartIcon({ size = 22, color = '#1F2A44' }) {

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">

}

function BellIcon({ size = 18, color = '#fff' }) {

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M6 16V11a6 6 0 1 1 12 0v5l1.5 2h-15L6 16z" stroke={color} strokeWidth="2" strokeLinejoin="round"/>

function StarIcon({ size = 14, color = '#FFB400' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z" fill={color}/>

}

// ─── screen1-main.jsx ─────────────────────────────────────────

function S1Header({ onClose }) {

        position:'absolute', right: 12, top: '50%', transform:'translateY(-50%)',

        <span style={{ color:'#fff', fontSize: 9.5, fontWeight: 800, letterSpacing:'-0.04em', lineHeight: 1.15, textAlign:'center' }}>cou{'\n'}pang</span>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize: 12, color:'#5A6478', fontWeight: 400 }}>쇼핑 혜택 가이드를 확인하면</div>
        <div style={{ fontSize: 16, fontWeight: 800, color:'#0F1424', marginTop: 2, letterSpacing:'-0.02em' }}>

function S1MallTab({ logo, label, status, active }) {

        display:'flex', alignItems:'center', gap: 7,
        padding:'8px 16px', borderRadius: 999,

          color: active ? '#fff' : '#1F2A44', letterSpacing:'-0.01em' }}>

          </div>

function S1SearchBar() {

    <div style={{ width: 110, flex:'0 0 auto' }}>

          <div>
            <div>{s.label}</div>
            <div style={{ fontSize: 10.5, fontWeight: 500, opacity: 0.8 }}>{s.sub}</div>
          </div>
        </div>
      ))}
      <div style={{ marginTop: 12, padding: '10px 8px',
        background:'#F4F8FF', borderRadius: 8, fontSize: 11, color:'#5A6478', lineHeight: 1.5 }}>
        화면을 탭하면 자동으로 다음 단계로 진행됩니다.
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);

  const renderBase = () => {
    if (step <= 2) {
      return <Screen1Main
        onClose={() => setStep(0)}
        onBannerClick={() => setStep(1)}
        onProductClick={() => step === 2 ? setStep(3) : null} />;
    }
    if (step === 3) {
      return <Screen4Coupang onBack={() => setStep(4)} />;
    }
    return <Screen5Return onClose={() => setStep(0)} />;
  };

  const renderOverlay = () => {
    if (step === 1) return <Screen2Popup onPrimary={() => setStep(2)} onClose={() => setStep(0)}/>;
    if (step === 2) return <Screen3Coachmark onComplete={() => setStep(3)} deviceWidth={390}/>;
    if (step === 5) return <Screen6Reward onClose={() => setStep(0)} />;
    return null;
  };

  useEffect(() => {
    if (step === 4) {
      const t = setTimeout(() => setStep(5), 600);
      return () => clearTimeout(t);
    }
  }, [step]);

  return (
    <div className="stage">
      <StepRail step={step} setStep={setStep}/>
      <div className="device-shell">
        <IOSDevice width={390} height={844} time="9:41">
          <div style={{ position:'relative', width:'100%', height:'100%',
            overflow:'hidden', background:'#F4F6FA' }}>
            <div style={{ width:'100%', height:'100%', overflowY:'auto',
              WebkitOverflowScrolling:'touch' }}>
              {renderBase()}
            </div>
            {renderOverlay()}
          </div>
        </IOSDevice>
        <div className="label">{`0${step + 1} · ${STEPS[step].label}`}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
