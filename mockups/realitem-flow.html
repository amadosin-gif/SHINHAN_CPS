<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>realitem · 경품 수령 Flow</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #EEF1F6;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #111;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }

  .stage {
    min-height: 100vh;
    display: flex;
    gap: 48px;
    align-items: center;
    justify-content: center;
    padding: 40px;
    flex-wrap: wrap;
  }

  .rail {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    left: 24px;
    width: 230px;
    background: #fff;
    border-radius: 18px;
    padding: 18px 16px;
    box-shadow: 0 8px 30px rgba(20,30,60,0.08);
    z-index: 50;
  }
  .rail h3 { margin:0 0 12px; font-size: 13px; font-weight: 700; color:#1F2A44; letter-spacing:-0.01em; }
  .rail .step {
    display: flex; gap: 10px; align-items: center;
    padding: 9px 10px; border-radius: 10px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; color:#5A6478;
    transition: all .18s ease;
  }
  .rail .step:hover { background:#F1F5FB; color:#0046FF; }
  .rail .step.active { background:#E8F0FF; color:#0046FF; font-weight: 700; }
  .rail .step .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background:#E5EAF2; color:#5A6478;
    display:flex; align-items:center; justify-content:center;
    font-weight: 700; font-size: 11.5px; flex-shrink: 0;
  }
  .rail .step.active .dot { background:#0046FF; color:#fff; }

  .device-shell { display:flex; flex-direction: column; align-items:center; gap: 14px; }
  .device-shell .label {
    font-size: 12px; color:#5A6478; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  @media (max-width: 1100px) { .rail { display: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── ios-frame ────────────────────────────────────────────────

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'21px 24px 19px', boxSizing:'border-box',
      position:'relative', zIndex: 20, width:'100%',
    }}>
      <div style={{ flex:1, height:22, display:'flex', alignItems:'center', justifyContent:'center', paddingTop:1.5 }}>
        <span style={{ fontFamily:'-apple-system,"SF Pro",system-ui', fontWeight:590, fontSize:17, lineHeight:'22px', color:c }}>{time}</span>
      </div>
      <div style={{ flex:1, height:22, display:'flex', alignItems:'center', justifyContent:'center', gap:7, paddingRight:1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSDevice({ children, width = 390, height = 844, dark = false, time = '9:41' }) {
  return (
    <div style={{
      width, height, borderRadius:48, overflow:'hidden',
      position:'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow:'0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily:'Pretendard,-apple-system,system-ui,sans-serif',
      WebkitFontSmoothing:'antialiased',
    }}>
      <div style={{ position:'absolute', top:11, left:'50%', transform:'translateX(-50%)', width:126, height:37, borderRadius:24, background:'#000', zIndex:50 }}/>
      <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10 }}>
        <IOSStatusBar dark={dark} time={time}/>
      </div>
      <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{ flex:1, overflow:'auto' }}>{children}</div>
      </div>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:60, height:34, display:'flex', justifyContent:'center', alignItems:'flex-end', paddingBottom:8, pointerEvents:'none' }}>
        <div style={{ width:139, height:5, borderRadius:100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }}/>
      </div>
    </div>
  );
}

// ─── brand tokens + icons ─────────────────────────────────────

const SHC = {
  blue:'#0046FF', blueLight:'#E8F0FF', ink:'#0F1424',
  text:'#1F2A44', sub:'#5A6478', mute:'#8A93A6',
  line:'#E5EAF2', bg:'#F4F6FA', white:'#fff',
  yellow:'#FFC940', red:'#FF3B30',
};

function PointCoin({ size = 28 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display:'block' }}>
      <circle cx="20" cy="20" r="18" fill="#FFC940"/>
      <text x="20" y="27" textAnchor="middle" fontFamily="Pretendard,system-ui" fontWeight="800" fontSize="18" fill="#7A4A00">P</text>
    </svg>
  );
}

function CloseX({ size = 22, color = '#1F2A44' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18" stroke={color} strokeWidth="2.2" strokeLinecap="round"/>
    </svg>
  );
}

function SearchIcon({ size = 20, color = '#5A6478' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="6.5" stroke={color} strokeWidth="2"/>
      <path d="M16 16l4 4" stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

// ─── Shopping background sub-components ──────────────────────

function S1MallTab({ logo, label, status, active }) {
  return (
    <div style={{ position:'relative', display:'inline-flex', alignItems:'center', flexShrink:0 }}>
      {status && (
        <div style={{
          position:'absolute', top:-9, left:'50%', transform:'translateX(-50%)',
          fontSize:9.5, fontWeight:600, background:'#F1F3F8', color:'#5A6478',
          padding:'2px 7px', borderRadius:8, border:'1px solid #E5EAF2',
          whiteSpace:'nowrap', zIndex:2,
        }}>{status}</div>
      )}
      <div style={{
        display:'flex', alignItems:'center', gap:7, padding:'8px 16px', borderRadius:999,
        background: active ? SHC.blue : '#fff',
        border: active ? `2px solid ${SHC.blue}` : '1.5px solid #D0D5DE',
        opacity: status ? 0.7 : 1,
      }}>
        {logo}
        <span style={{ fontSize:14, fontWeight:700, color: active ? '#fff' : '#1F2A44', letterSpacing:'-0.01em' }}>{label}</span>
      </div>
    </div>
  );
}

function S1MallTabs() {
  return (
    <div style={{ display:'flex', gap:10, padding:'20px 16px 14px', overflowX:'auto' }}>
      <S1MallTab active label="쿠팡"
        logo={<div style={{ width:24, height:24, borderRadius:'50%', background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <span style={{ fontSize:7.5, fontWeight:800, color:'#FF5000', letterSpacing:'-0.04em', lineHeight:1 }}>cou{'\n'}pang</span>
        </div>}/>
      <S1MallTab status="준비중" label="네이버"
        logo={<div style={{ width:24, height:24, borderRadius:'50%', background:'#03C75A', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <span style={{ color:'#fff', fontWeight:900, fontSize:11, letterSpacing:'-0.05em' }}>N+</span>
        </div>}/>
      <S1MallTab status="준비중" label="컬리"
        logo={<div style={{ width:24, height:24, borderRadius:'50%', background:'#5C2880', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <span style={{ color:'#fff', fontWeight:800, fontSize:8.5, fontStyle:'italic', fontFamily:'serif' }}>Kurly</span>
        </div>}/>
    </div>
  );
}

function S1MyBenefit() {
  return (
    <div style={{ margin:'4px 16px 14px', padding:'14px 16px', background:'#fff', borderRadius:14, border:'1px solid #F0F2F6' }}>
      <div style={{ fontSize:13.5, fontWeight:700, color:'#1F2A44', marginBottom:10 }}>이번 달 받은 혜택 보기</div>
      <div style={{ display:'flex', gap:8, position:'relative' }}>
        <div style={{ flex:1, padding:'9px 12px', borderRadius:999, border:'1px solid #E5EAF2', fontSize:12, color:'#5A6478', textAlign:'center' }}>
          내 보유 티켓 <b style={{ color:'#1F2A44' }}>1개</b>
        </div>
        <div style={{ flex:1, padding:'9px 12px', borderRadius:999, border:'1px solid #E5EAF2', fontSize:12, color:'#5A6478', textAlign:'center', position:'relative' }}>
          내 보유 쿠폰 <b style={{ color:'#1F2A44' }}>1개</b>
          <div style={{ position:'absolute', top:'calc(100% + 8px)', right:0, background:'#fff', border:`1.2px solid ${SHC.blue}`, color:SHC.blue, fontSize:11.5, fontWeight:600, padding:'6px 10px', borderRadius:999, whiteSpace:'nowrap' }}>
            지급 예정인 쿠폰이 1개 있어요!
            <span style={{ position:'absolute', top:-6, right:22, width:10, height:10, background:'#fff', borderTop:`1.2px solid ${SHC.blue}`, borderLeft:`1.2px solid ${SHC.blue}`, transform:'rotate(45deg)' }}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function S1GiftList() {
  const gifts = [
    { name:'BBQ\n치킨세트', tint:'#FFF1E0' },
    { name:'뚜레쥬르\n식빵', tint:'#FFE9E0' },
    { name:'스타벅스\n아메리카노', tint:'#E5F4EE' },
  ];
  return (
    <div style={{ margin:'18px 16px 24px' }}>
      <div style={{ fontSize:14, fontWeight:700, color:'#1F2A44', marginBottom:10 }}>4월 행운의 선물 리스트</div>
      <div style={{ display:'flex', gap:10, overflowX:'auto' }}>
        {gifts.map((g,i) => (
          <div key={i} style={{ flex:'0 0 124px', height:130, background:'#fff', border:'1px solid #F0F2F6', borderRadius:12, padding:12, display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
            <div style={{ fontSize:13, fontWeight:700, color:'#1F2A44', whiteSpace:'pre-line', lineHeight:1.3 }}>{g.name}</div>
            <div style={{ alignSelf:'flex-end', width:56, height:56, borderRadius:12, background:g.tint }}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── screens-bg: Shopping background ─────────────────────────

function ShoppingBg() {
  return (
    <div style={{ background:'#F4F6FA', minHeight:'100%', paddingTop:50 }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:52, position:'relative', background:'#fff', borderBottom:'1px solid #F0F2F6' }}>
        <div style={{ fontSize:17, fontWeight:700, color:'#0F1424', letterSpacing:'-0.01em' }}>쇼핑 혜택</div>
        <div style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)' }}>
          <CloseX size={22} color="#0F1424"/>
        </div>
      </div>

      {/* Event banner */}
      <div style={{ margin:'14px 16px 0', borderRadius:14, background:'#fff', border:'1px solid #F0F2F6', padding:'14px 16px', display:'flex', alignItems:'center', gap:14, position:'relative', overflow:'hidden' }}>
        <div style={{ width:48, height:48, borderRadius:'50%', flexShrink:0, background:'#FF5000', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <span style={{ color:'#fff', fontSize:9.5, fontWeight:800, letterSpacing:'-0.04em', lineHeight:1.15, textAlign:'center' }}>cou{'\n'}pang</span>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:12, color:'#5A6478', fontWeight:400 }}>쇼핑 혜택 가이드를 확인하면</div>
          <div style={{ fontSize:16, fontWeight:800, color:'#0F1424', marginTop:2, letterSpacing:'-0.02em' }}>룰렛 티켓을 선물해드려요!</div>
        </div>
        <div style={{ display:'flex', gap:5, position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)' }}>
          <span style={{ width:6, height:6, borderRadius:'50%', background:SHC.blue }}/>
          <span style={{ width:6, height:6, borderRadius:'50%', background:'#D0D5DE' }}/>
        </div>
      </div>

      <S1MallTabs/>

      {/* spacer so popup overlaps upper content */}
      <div style={{ height:220 }}/>
      <S1MyBenefit/>
      <S1GiftList/>
    </div>
  );
}

// ─── screen1-admin ────────────────────────────────────────────

function RIScreen1Admin() {
  return (
    <div style={{ position:'absolute', inset:0, background:'rgba(15,22,46,0.45)', display:'flex', alignItems:'center', justifyContent:'center', padding:'0 18px', zIndex:30 }}>
      <div style={{ width:'100%', maxWidth:332, background:'#fff', borderRadius:16, padding:'40px 24px 22px', boxShadow:'0 18px 50px rgba(15,22,46,0.18)', textAlign:'center' }}>
        <div style={{ height:110 }}/>

          연락필수<br/>
          --이후에는 당첨항목 삭제

        <button style={{ width:'100%', height:48, borderRadius:8, background:'#0046FF', color:'#fff', border:'none', fontSize:14.5, fontWeight:700, cursor:'default', letterSpacing:'-0.01em' }}>닫기</button>
      </div>

  );
}

// ─── screen2-gift ─────────────────────────────────────────────

function GiftIllustration() {

      <circle cx="60" cy="60" r="56" fill="#EAF1FF"/>

function RIScreen2Gift({ onViewList, onClose }) {
  return (
    <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.45)', display:'flex', flexDirection:'column', justifyContent:'flex-end', zIndex:30 }}>
      <style>{`@keyframes rISlideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }`}</style>
      <div style={{ background:'#fff', borderRadius:'20px 20px 0 0', animation:'rISlideUp .3s cubic-bezier(.25,.9,.3,1)', paddingBottom:40 }}>

        {/* Title bar */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 20px 0' }}>
          <span style={{ fontSize:16, fontWeight:700, color:'#0F1424', letterSpacing:'-0.02em' }}>실물경품 배송안내</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:'#5A6478', lineHeight:1, padding:'4px 4px' }}>✕</button>

        <div style={{ padding:'36px 24px 28px', textAlign:'center' }}>
          <div style={{ fontSize:76, lineHeight:1, marginBottom:22 }}>🎁</div>
          <div style={{ fontSize:20, fontWeight:800, color:'#0F1424', letterSpacing:'-0.03em', lineHeight:1.35 }}>
            당첨되신 <span style={{ color:'#0046FF' }}>에어팟 4</span>는<br/>
            <span style={{ color:'#0046FF' }}>6/15일</span>부터 배송정보 수집예정입니다.
          </div>
        </div>

        {/* Buttons */}
        <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:8 }}>

          <button onClick={onClose} style={{ width:'100%', height:50, borderRadius:10, background:'#0046FF', color:'#fff', border:'none', fontSize:15, fontWeight:700, cursor:'pointer', letterSpacing:'-0.01em' }}>닫기</button>

        {/* 다시 보지 않기 – bottom-right */}
        <div style={{ textAlign:'right', padding:'10px 20px 0', fontSize:11.5, color:'#B0B8C8', cursor:'pointer' }}>
          다시 보지 않기 (정보 제공 완료)
        </div>
      </div>
    </div>

// ─── screen3-list ─────────────────────────────────────────────

function AirpodsIllo() {

    <svg width="100%" height="100%" viewBox="0 0 140 140" preserveAspectRatio="xMidYMid meet">

        <linearGradient id="apBg" x1="0" y1="0" x2="1" y2="1">

        <circle cx="6" cy="6" r="2.5" fill="#E8EDF5"/>

      <g transform="translate(82,30)">
        <ellipse cx="6" cy="6" rx="6" ry="6" fill="#fff" stroke="#C9D2E0" strokeWidth="1.4"/>
        <rect x="3.5" y="11" width="5" height="20" rx="2" fill="#fff" stroke="#C9D2E0" strokeWidth="1.4"/>
        <circle cx="6" cy="6" r="2.5" fill="#E8EDF5"/>
      </g>
      <ellipse cx="70" cy="116" rx="28" ry="3" fill="#0F1424" opacity="0.06"/>

}

function GoldCardIllo() {
  return (
    <svg width="100%" height="100%" viewBox="0 0 140 140" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gcBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#FFF6E0"/>
          <stop offset="100%" stopColor="#F4E2B0"/>
        </linearGradient>
        <linearGradient id="gcCard" x1="0" y1="0" x2="1" y2="1">

// ─── app ──────────────────────────────────────────────────────

const { useState, useEffect, useRef } = React;

const RI_SCREENS = [
  { id:1, label:'01 Admin (~5/31)' },
  { id:2, label:'02 Gift popup' },
  { id:3, label:'03 지급예정 list' },
  { id:4, label:'04 Detail' },
  { id:5, label:'05 Scroll + 안내' },
];

function RailNav({ current, onJump }) {
  return (
    <div className="rail">
      <h3>realitem · 화면 흐름</h3>
      {RI_SCREENS.map(s => (
        <div key={s.id} className={`step ${s.id===current?'active':''}`} onClick={()=>onJump(s.id)}>
          <span className="dot">{s.id}</span>
          <span>{s.label}</span>
        </div>
      ))}
      <div style={{ marginTop:12, padding:'10px 8px', background:'#F4F8FF', borderRadius:8, fontSize:11, color:'#5A6478', lineHeight:1.5 }}>
        화면을 탭하면 자동으로 다음 단계로 진행됩니다.
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(2);
  const scrollRef = useRef();

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [step]);

  const renderBase = () => {
    switch (step) {
      case 1:
      case 2: return <ShoppingBg/>;
      case 3: return <RIScreen3List onBack={()=>setStep(2)} onClose={()=>setStep(2)} onCardClick={()=>setStep(4)}/>;
      case 4: return <RIScreen4Detail onBack={()=>setStep(3)} onClose={()=>setStep(2)} onClick={()=>setStep(5)}/>;
      case 5: return <RIScreen5Scroll onBack={()=>setStep(4)} onClose={()=>setStep(2)}/>;
      default: return null;
    }
  };

  const renderOverlay = () => {
    if (step===1) return <RIScreen1Admin/>;
    if (step===2) return <RIScreen2Gift onViewList={()=>setStep(3)} onClose={()=>setStep(4)}/>;
    return null;
  };

  const current = RI_SCREENS.find(s => s.id===step);

  return (
    <>
      <RailNav current={step} onJump={setStep}/>
      <div className="stage">
        <div className="device-shell">
          <IOSDevice width={390} height={844} time="9:41">
            <div style={{ position:'relative', width:'100%', height:'100%', overflow:'hidden', background:'#F4F6FA' }}>
              <div ref={scrollRef} style={{ width:'100%', height:'100%', overflowY:'auto', WebkitOverflowScrolling:'touch' }}>
                {renderBase()}
              </div>
              {renderOverlay()}
            </div>
          </IOSDevice>
          <div className="label">{current?.label}</div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
