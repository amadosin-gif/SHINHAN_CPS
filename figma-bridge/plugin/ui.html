<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, sans-serif; padding: 16px; margin: 0; background: #F9FAFB; }
  .status { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .status.connected    { background: #D1FAE5; color: #065F46; }
  .status.disconnected { background: #FEE2E2; color: #991B1B; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .connected    .dot { background: #10B981; }
  .disconnected .dot { background: #EF4444; }
  .hint { margin-top: 12px; font-size: 11px; color: #6B7280; line-height: 1.6; }
</style>
</head>
<body>
  <div class="status disconnected" id="status">
    <div class="dot"></div>
    <span id="label">서버 연결 중...</span>
  </div>
  <div class="hint">
    서버가 꺼져 있으면 <b>start.bat</b>을 먼저 실행하거나<br>
    Claude Code를 열어주세요.
  </div>
  <script>
    var ws = null;

    function connect() {
      ws = new WebSocket('ws://localhost:7777');

      ws.onopen = function() {
        setStatus(true);
      };

      ws.onclose = function() {
        setStatus(false);
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        ws.close();
      };

      // WebSocket 서버로부터 명령 수신 → code.js로 전달
      ws.onmessage = function(event) {
        var msg = JSON.parse(event.data);
        parent.postMessage({ pluginMessage: msg }, '*');
      };
    }

    // code.js로부터 결과 수신 → WebSocket 서버로 전달
    window.onmessage = function(e) {
      if (!e.data || !e.data.pluginMessage) return;
      var msg = e.data.pluginMessage;
      if (msg.type === 'RESULT') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            id: msg.id,
            success: msg.success,
            data: msg.data,
            error: msg.error
          }));
        }
      }
    };

    function setStatus(connected) {
      var el = document.getElementById('status');
      var lb = document.getElementById('label');
      el.className = connected ? 'status connected' : 'status disconnected';
      lb.textContent = connected ? '서버 연결됨 (localhost:7777)' : '서버 연결 안 됨';
    }

    connect();
  </script>
</body>
</html>
